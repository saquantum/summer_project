<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Sending Email</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      max-width: 500px;
      margin: auto;
    }
    label {
      display: block;
      margin-top: 20px;
      font-weight: bold;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      height: 150px;
      resize: vertical;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      color: green;
      font-weight: bold;
    }
    #error {
      margin-top: 20px;
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
<h2>Email Sending System</h2>

<label for="subject">Subject:</label>
<input type="text" id="subject" placeholder="Please enter subject" />

<label for="content">Content(use {unsubscribeUrl} to add unsubscribe link):</label>
<textarea id="content" placeholder="Please enter the content，add unsubscribe link:{unsubscribeUrl}"></textarea>

<button id="sendBtn">Click To Send Email</button>

<div id="result"></div>
<div id="error"></div>

<script>
  const sendBtn = document.getElementById('sendBtn');
  const resultDiv = document.getElementById('result');
  const errorDiv = document.getElementById('error');
  const subjectInput = document.getElementById('subject');
  const contentInput = document.getElementById('content');

  sendBtn.addEventListener('click', () => {
    const subject = subjectInput.value.trim();
    const content = contentInput.value.trim();

    resultDiv.textContent = '';
    errorDiv.textContent = '';

    if (!subject) {
      errorDiv.textContent = 'Email subject cannot be empty';
      return;
    }
    if (!content) {
      errorDiv.textContent = 'Email content cannot be empty';
      return;
    }

    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending...';

    fetch('/admin/send', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ subject, content })
    })
            .then(response => {
              if (!response.ok) {
                throw new Error('Network Error');
              }
              return response.text();
            })
            .then(text => {
              resultDiv.textContent = text;
              sendBtn.textContent = 'Click To Send Email';
              sendBtn.disabled = false;
            })
            .catch(err => {
              errorDiv.textContent = 'Sending Error：' + err.message;
              sendBtn.textContent = 'Click To Send Email';
              sendBtn.disabled = false;
            });
  });
</script>
</body>
</html>
